name: lazylegs

channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults

dependencies:
  # Target stack for this fork on Windows: Python 3.8, CUDA 11.8, PyTorch 2.0.0.
  - python=3.8
  - pip=23.3.1
  - setuptools=68.2.2
  - wheel=0.41.2
  - ninja=1.11.1
  - packaging=23.2

  # PyTorch CUDA runtime. A system CUDA 11.8 toolkit with nvcc is still needed
  # when building the local CUDA extensions from submodules.
  - pytorch=2.0.0
  - torchvision=0.15.0
  - torchaudio=2.0.0
  - pytorch-cuda=11.8

  # Core runtime dependencies.
  - numpy=1.24.4
  - scipy=1.10.1
  - pillow=10.2.0
  - tqdm=4.66.2
  - plyfile=0.8.1
  - imageio=2.34.0
  - scikit-image=0.21.0
  - matplotlib=3.7.5
  - ffmpeg=4.2.2
  - typing_extensions=4.9.0

  - pip:
      - --find-links https://data.pyg.org/whl/torch-2.0.0+cu118.html
      - opencv-python==4.8.1.78
      - tensorboard==2.14.0
      - lpips==0.1.4
      - websockets==12.0
      - torch-scatter==2.1.1+pt20cu118
